<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数组轮转：三次反转法可视化</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f5f7fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: #333;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 600px;
    }

    h2 {
      margin-top: 0;
      text-align: center;
      color: #2c3e50;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
    }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background-color: #42b983;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background-color: #33a06f;
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    #reset-btn {
      background-color: #e74c3c;
    }

    #reset-btn:hover {
      background-color: #c0392b;
    }

    .status-box {
      background: #eef2f5;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 30px;
      font-weight: 500;
      text-align: center;
      min-height: 24px;
    }

    /* 动画区域样式 */
    .array-stage {
      position: relative;
      height: 80px;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .box {
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      color: white;
      transition: left 0.6s cubic-bezier(0.25, 1, 0.5, 1);
      /* 核心平滑动画 */
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    /* 颜色区分 */
    .block-a {
      background-color: #3498db;
    }

    /* 蓝色代表前面的 A 块 */
    .block-b {
      background-color: #e67e22;
    }

    /* 橙色代表要移动的 B 块 */

    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      font-size: 14px;
    }

    .legend span {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .color-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>三次反转法 (k 步轮转)</h2>

    <div class="controls">
      <div class="slider-group">
        <label for="k-slider">k = <span id="k-value">3</span></label>
        <input type="range" id="k-slider" min="1" max="6" value="3">
      </div>
      <div>
        <button id="reset-btn">重置</button>
        <button id="next-btn">下一步动画</button>
      </div>
    </div>

    <div class="status-box" id="status-text">
      初始状态：等待开始
    </div>

    <div class="array-stage" id="stage">
    </div>

    <div class="legend">
      <span>
        <div class="color-dot block-a"></div> A块 (前 n-k 个)
      </span>
      <span>
        <div class="color-dot block-b"></div> B块 (后 k 个)
      </span>
    </div>
  </div>

  <script>
    const n = 7;
    let k = 3;
    let step = 0;
    let elements = []; // 存储 DOM 节点和对应的值

    const stage = document.getElementById('stage');
    const kSlider = document.getElementById('k-slider');
    const kValueObj = document.getElementById('k-value');
    const statusText = document.getElementById('status-text');
    const nextBtn = document.getElementById('next-btn');
    const resetBtn = document.getElementById('reset-btn');

    // 初始化数组和 DOM
    function init() {
      k = parseInt(kSlider.value);
      kValueObj.innerText = k;
      step = 0;
      stage.innerHTML = '';
      elements = [];

      let initialArray = [1, 2, 3, 4, 5, 6, 7];

      for (let i = 0; i < n; i++) {
        const el = document.createElement('div');
        el.className = 'box';
        el.innerText = initialArray[i];

        // 涂色区分 A 块和 B 块
        if (i >= n - k) {
          el.classList.add('block-b');
        } else {
          el.classList.add('block-a');
        }

        // 初始位置 (每个方块宽50，间距10，共60)
        el.style.left = (i * 60) + 'px';
        stage.appendChild(el);

        elements.push({ node: el, val: initialArray[i] });
      }

      statusText.innerText = "初始状态：准备将橙色的 B 块移到最前面";
      nextBtn.disabled = false;
    }

    // 执行区间反转的逻辑和动画
    function reverse(start, end) {
      while (start < end) {
        // 交换 elements 数组中的对象引用
        let temp = elements[start];
        elements[start] = elements[end];
        elements[end] = temp;

        start++;
        end--;
      }
      // 根据新的数组顺序，重新计算 left 值，触发 CSS 动画
      for (let i = 0; i < n; i++) {
        elements[i].node.style.left = (i * 60) + 'px';
      }
    }

    // 状态机处理
    nextBtn.addEventListener('click', () => {
      if (step === 0) {
        reverse(0, n - 1);
        statusText.innerHTML = "<b>步骤一：</b>反转整个数组。<br><i>(成功把橙色B块丢到了前面，但内部顺序颠倒了)</i>";
        step++;
      } else if (step === 1) {
        reverse(0, k - 1);
        statusText.innerHTML = "<b>步骤二：</b>反转前 k 个元素。<br><i>(成功理顺了前面橙色B块的内部顺序)</i>";
        step++;
      } else if (step === 2) {
        reverse(k, n - 1);
        statusText.innerHTML = "<b>步骤三：</b>反转剩余的 n-k 个元素。<br><i>(成功理顺了后面蓝色A块的顺序)。大功告成！</i>";
        nextBtn.disabled = true;
        step++;
      }
    });

    // 绑定事件
    kSlider.addEventListener('input', init);
    resetBtn.addEventListener('click', init);

    // 页面加载时初始化一次
    init();
  </script>

</body>

</html>
