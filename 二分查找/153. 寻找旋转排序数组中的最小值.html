<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寻找旋转排序数组中的最小值 - 算法演示</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f0f2f5;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      display: flex;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      gap: 30px;
      max-width: 1200px;
      width: 95%;
    }

    .visualization-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .code-panel {
      width: 450px;
      background: #282c34;
      color: #abb2bf;
      padding: 20px;
      border-radius: 8px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.6;
      overflow-x: auto;
    }

    h2 {
      margin-top: 0;
      font-size: 20px;
      color: #2c3e50;
    }

    /* 控制区 */
    .controls {
      display: flex;
      gap: 15px;
      margin-top: 20px;
      align-items: center;
      width: 100%;
      justify-content: center;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background-color: #3498db;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: background 0.2s;
    }

    button:hover {
      background-color: #2980b9;
    }

    button:disabled {
      background-color: #bdc3c7;
      cursor: not-allowed;
    }

    /* 状态说明区 */
    .status-box {
      margin-top: 20px;
      padding: 15px;
      background: #e8f4fd;
      border-left: 5px solid #3498db;
      border-radius: 4px;
      width: 100%;
      min-height: 60px;
      font-size: 15px;
      font-weight: 500;
    }

    /* 代码高亮行 (已修复缩进问题) */
    .code-line {
      padding: 2px 10px;
      border-radius: 4px;
      margin: 2px 0;
      transition: background 0.3s;
      white-space: pre;
    }

    .code-line.active {
      background-color: #3e4451;
      border-left: 4px solid #98c379;
      color: #fff;
    }

    .keyword {
      color: #c678dd;
    }

    .variable {
      color: #e06c75;
    }

    .function {
      color: #61afef;
    }

    .comment {
      color: #7f848e;
      font-style: italic;
    }

    .number {
      color: #d19a66;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="visualization-panel">
      <h2>寻找最小值 (高地与低谷模型)</h2>
      <svg id="chart" width="550" height="350"></svg>

      <div class="controls">
        <button id="btn-start">重新开始</button>
        <button id="btn-step" disabled>单步推演 ⏭</button>
      </div>

      <div class="status-box" id="status-text">
        准备就绪。点击“重新开始”进行二分推演。
      </div>
    </div>

    <div class="code-panel" id="code-container">
    </div>
  </div>

  <script>
    // === 核心数据与状态 ===
    const nums = [4, 5, 6, 7, 0, 1, 2];
    const SVG_WIDTH = 550;
    const SVG_HEIGHT = 350;
    const PADDING = 40;
    const CHART_H = SVG_HEIGHT - 80;

    let frames = [];
    let currentFrame = 0;

    // 代码模板
    const codeLines = [
        /* 0 */ "<span class='keyword'>def</span> <span class='function'>findMin</span>(nums):",
        /* 1 */ "    left, right = <span class='number'>0</span>, <span class='function'>len</span>(nums) - <span class='number'>1</span>",
        /* 2 */ "    <span class='comment'># 只要区间内至少有两个元素，就继续挤压</span>",
        /* 3 */ "    <span class='keyword'>while</span> left < right:",
        /* 4 */ "        mid = (left + right) // <span class='number'>2</span>",
        /* 5 */ "        <span class='comment'># 核心：拿 mid 和当前的右边界 right 进行对决</span>",
        /* 6 */ "        <span class='keyword'>if</span> nums[mid] > nums[right]:",
        /* 7 */ "            <span class='comment'># mid 踩在高地上，最小值必定在断崖右侧</span>",
        /* 8 */ "            left = mid + <span class='number'>1</span>",
        /* 9 */ "        <span class='keyword'>else</span>:",
        /* 10 */"            <span class='comment'># mid 落在低谷里，最小值可能是它自己或在左侧</span>",
        /* 11 */"            right = mid",
        /* 12 */"    <span class='comment'># 循环打破时，left == right，直指最小值</span>",
        /* 13 */"    <span class='keyword'>return</span> nums[left]"
    ];

    // 初始化渲染代码面板
    const codeContainer = document.getElementById("code-container");
    codeLines.forEach((line, index) => {
      const div = document.createElement("div");
      div.className = "code-line";
      div.id = `code-${index}`;
      div.innerHTML = line;
      codeContainer.appendChild(div);
    });

    // 初始化 SVG
    const svg = d3.select("#chart");
    const xScale = d3.scaleBand().domain(d3.range(nums.length)).range([PADDING, SVG_WIDTH - PADDING]).padding(0.2);
    const yScale = d3.scaleLinear().domain([0, 7]).range([CHART_H, PADDING]);

    const barGroup = svg.append("g");
    const pointerGroup = svg.append("g");
    const highlightGroup = svg.append("g");

    // === 生成推演帧 (状态机) ===
    function generateFrames() {
      frames = [];
      let left = 0;
      let right = nums.length - 1;

      function snapshot(L, R, M, activeCodeLines, msg, success = false, comparing = false) {
        frames.push({ left: L, right: R, mid: M, code: activeCodeLines, msg, success, comparing });
      }

      snapshot(left, right, null, [1, 3], `初始状态: left = ${left}, right = ${right}。`);

      while (left < right) {
        let mid = Math.floor((left + right) / 2);
        snapshot(left, right, mid, [4], `计算中心点: mid = ${mid} (值为 ${nums[mid]})`);

        snapshot(left, right, mid, [6], `对决时刻: nums[mid] (${nums[mid]}) 与 nums[right] (${nums[right]}) 谁更大？`, false, true);

        if (nums[mid] > nums[right]) {
          left = mid + 1;
          snapshot(left, right, mid, [7, 8], `🔴 ${nums[mid]} > ${nums[right]}，说明 mid 踩在左侧的“高地”上！真正的最小值肯定在它右边的断崖下。因此，抛弃左半边，left 移动到 mid + 1。`);
        } else {
          right = mid;
          snapshot(left, right, mid, [10, 11], `🟢 ${nums[mid]} < ${nums[right]}，说明 mid 已经掉进了右侧的“低谷”中。最小值可能是它自己，或者是它左边的元素。因此，抛弃右半边，但保留 mid：right = mid。`);
        }

        snapshot(left, right, null, [3], `进入下一轮循环，当前挤压后的生存空间为 [${left}..${right}]`);
      }

      snapshot(left, right, left, [12, 13], `🏆 循环结束！left 和 right 重合在索引 ${left}，这就是整个数组的绝对低谷（最小值：${nums[left]}）。`, true);
    }

    // === 渲染核心 ===
    function renderFrame(frameIndex) {
      const frame = frames[frameIndex];

      // 1. 更新状态文字
      document.getElementById("status-text").innerHTML = frame.msg;

      // 2. 更新代码高亮
      document.querySelectorAll(".code-line").forEach(el => el.classList.remove("active"));
      frame.code.forEach(lineIdx => {
        document.getElementById(`code-${lineIdx}`).classList.add("active");
      });

      // 3. 渲染柱状图 (高地与低谷)
      const bars = barGroup.selectAll("rect").data(nums);
      bars.enter().append("rect")
        .merge(bars)
        .attr("x", (d, i) => xScale(i))
        .attr("y", d => yScale(d))
        .attr("width", xScale.bandwidth())
        .attr("height", d => CHART_H - yScale(d))
        .attr("rx", 4)
        .attr("fill", (d, i) => {
          // 不在搜索区间内的变灰
          if (i < frame.left || i > frame.right) return "#ecf0f1";
          // 成功找到最终结果
          if (frame.success && i === frame.left) return "#e74c3c";
          // 对决时刻高亮 mid 和 right
          if (frame.comparing) {
            if (i === frame.mid) return "#f39c12"; // mid 橙色
            if (i === frame.right) return "#9b59b6"; // right 紫色
          }
          return "#3498db";
        })
        .style("opacity", (d, i) => (i < frame.left || i > frame.right) ? 0.4 : 1)
        .transition().duration(400);

      // 柱子上的文字
      const texts = barGroup.selectAll("text.val").data(nums);
      texts.enter().append("text").attr("class", "val")
        .merge(texts)
        .attr("x", (d, i) => xScale(i) + xScale.bandwidth() / 2)
        .attr("y", d => yScale(d) - 8)
        .attr("text-anchor", "middle")
        .text(d => d)
        .attr("fill", (d, i) => (i < frame.left || i > frame.right) ? "#bdc3c7" : "#2c3e50")
        .style("font-weight", "bold");

      // 4. 渲染底部的索引
      const indices = barGroup.selectAll("text.idx").data(nums);
      indices.enter().append("text").attr("class", "idx")
        .merge(indices)
        .attr("x", (d, i) => xScale(i) + xScale.bandwidth() / 2)
        .attr("y", CHART_H + 20)
        .attr("text-anchor", "middle")
        .text((d, i) => `i=${i}`)
        .attr("fill", "#7f8c8d")
        .style("font-size", "12px");

      // 5. 渲染指针 (L, R, M)
      pointerGroup.selectAll("*").remove();
      const drawPointer = (idx, label, color, yOffset) => {
        if (idx === null || idx < 0 || idx >= nums.length) return;
        const x = xScale(idx) + xScale.bandwidth() / 2;
        const y = CHART_H + 35 + yOffset;

        pointerGroup.append("path")
          .attr("d", d3.symbol().type(d3.symbolTriangle).size(60))
          .attr("transform", `translate(${x}, ${y}) rotate(180)`)
          .attr("fill", color)
          .style("opacity", 0)
          .transition().duration(300).style("opacity", 1);

        pointerGroup.append("text")
          .attr("x", x).attr("y", y + 15)
          .attr("text-anchor", "middle")
          .text(label).attr("fill", color)
          .style("font-weight", "bold").style("font-size", "14px")
          .style("opacity", 0)
          .transition().duration(300).style("opacity", 1);
      };

      if (!frame.success) {
        drawPointer(frame.left, "L", "#27ae60", 0);
        drawPointer(frame.right, "R", "#9b59b6", 20); // right用紫色标识，因为它是标尺
        if (frame.mid !== null) drawPointer(frame.mid, "M", "#f39c12", 40);
      } else {
        drawPointer(frame.left, "L=R=M", "#e74c3c", 0);
      }

      // 更新按钮状态
      document.getElementById("btn-step").disabled = (frameIndex === frames.length - 1);
    }

    // === 事件绑定 ===
    document.getElementById("btn-start").addEventListener("click", () => {
      generateFrames();
      currentFrame = 0;
      document.getElementById("btn-step").disabled = false;
      renderFrame(0);
    });

    document.getElementById("btn-step").addEventListener("click", () => {
      if (currentFrame < frames.length - 1) {
        currentFrame++;
        renderFrame(currentFrame);
      }
    });

    // 初始启动
    generateFrames();
    renderFrame(0);
    document.getElementById("btn-step").disabled = false;

  </script>
</body>

</html>
