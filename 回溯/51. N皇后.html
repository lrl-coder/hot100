<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N皇后回溯算法可视化 (N=4)</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f5f7fa;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      display: flex;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      gap: 40px;
    }

    .board-wrapper {
      position: relative;
    }

    .panel {
      display: flex;
      flex-direction: column;
      width: 300px;
    }

    h2 {
      margin-top: 0;
      font-size: 22px;
      color: #2c3e50;
    }

    /* 控制按钮 */
    .controls {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      background-color: #3498db;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: background 0.2s;
    }

    button:hover {
      background-color: #2980b9;
    }

    button:disabled {
      background-color: #bdc3c7;
      cursor: not-allowed;
    }

    /* 状态显示区 */
    .state-box {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      border-left: 4px solid #3498db;
    }

    .state-title {
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 14px;
      color: #7f8c8d;
    }

    .array-display {
      display: flex;
      gap: 4px;
      font-family: monospace;
      font-size: 14px;
    }

    .array-cell {
      width: 25px;
      height: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 4px;
      background: #eee;
      color: #aaa;
    }

    .array-cell.active {
      background: #e74c3c;
      color: white;
      font-weight: bold;
    }

    /* 提示信息 */
    #message {
      font-size: 16px;
      font-weight: bold;
      min-height: 40px;
      color: #d35400;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="board-wrapper">
      <svg id="chessboard" width="400" height="400"></svg>
    </div>

    <div class="panel">
      <h2>N 皇后状态观测台</h2>
      <div class="controls">
        <button id="btn-step">单步执行</button>
        <button id="btn-play">自动播放</button>
        <button id="btn-reset">重置</button>
      </div>

      <div id="message">准备就绪，点击开始。</div>

      <div class="state-box">
        <div class="state-title">当前目标行 (r)</div>
        <div id="display-r" style="font-size: 20px; font-weight: bold; color: #2c3e50;">0</div>
      </div>

      <div class="state-box">
        <div class="state-title">列封锁状态 (col)</div>
        <div class="array-display" id="display-col"></div>
      </div>

      <div class="state-box">
        <div class="state-title">主对角线封锁 (diag1: r-c+3)</div>
        <div class="array-display" id="display-diag1"></div>
      </div>

      <div class="state-box">
        <div class="state-title">副对角线封锁 (diag2: r+c)</div>
        <div class="array-display" id="display-diag2"></div>
      </div>
    </div>
  </div>

  <script>
    const N = 4;
    const SIZE = 400;
    const CELL = SIZE / N;

    // 初始化 D3 画布
    const svg = d3.select("#chessboard");
    const gridLayer = svg.append("g");
    const highlightLayer = svg.append("g");
    const queenLayer = svg.append("g");

    // 绘制国际象棋棋盘底色
    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        gridLayer.append("rect")
          .attr("x", c * CELL)
          .attr("y", r * CELL)
          .attr("width", CELL)
          .attr("height", CELL)
          .attr("fill", (r + c) % 2 === 0 ? "#ecf0f1" : "#bdc3c7");
      }
    }

    // 回溯算法帧生成器（预先计算好所有步骤，方便播放控制）
    let frames = [];

    function generateFrames() {
      frames = [];
      let col = Array(N).fill(false);
      let diag1 = Array(2 * N - 1).fill(false);
      let diag2 = Array(2 * N - 1).fill(false);
      let board = Array(N).fill(0).map(() => Array(N).fill('.'));

      function snapshot(r, c, type, msg) {
        frames.push({
          r, c, type, msg,
          board: JSON.parse(JSON.stringify(board)),
          col: [...col],
          diag1: [...diag1],
          diag2: [...diag2]
        });
      }

      function solve(r) {
        if (r === N) {
          snapshot(r, -1, 'success', `成功找到一个解！`);
          return;
        }
        let placedInThisRow = false;
        for (let c = 0; c < N; c++) {
          snapshot(r, c, 'try', `尝试在 第 ${r} 行, 第 ${c} 列 放置皇后`);

          if (col[c] || diag1[r - c + N - 1] || diag2[r + c]) {
            snapshot(r, c, 'conflict', `位置冲突！触发剪枝。`);
            continue;
          }

          // 做选择
          board[r][c] = 'Q';
          col[c] = true; diag1[r - c + N - 1] = true; diag2[r + c] = true;
          snapshot(r, c, 'place', `放置成功，封锁关联路径。进入下一行...`);

          // 递归
          solve(r + 1);

          // 撤销选择 (回溯)
          board[r][c] = '.';
          col[c] = false; diag1[r - c + N - 1] = false; diag2[r + c] = false;
          snapshot(r, c, 'backtrack', `此路不通或已收集完毕，撤销 ( ${r}, ${c} ) 的皇后`);
        }
      }
      solve(0);
      snapshot(0, -1, 'done', `遍历结束！`);
    }

    // UI 渲染逻辑
    let currentFrame = 0;
    let timer = null;

    function renderArray(elementId, arr) {
      const container = d3.select(elementId);
      container.selectAll("*").remove();
      arr.forEach(val => {
        container.append("div")
          .attr("class", `array-cell ${val ? 'active' : ''}`)
          .text(val ? 'T' : 'F');
      });
    }

    function drawHighlights(r, c) {
      highlightLayer.selectAll("*").remove();
      if (r < 0 || r >= N || c < 0 || c >= N) return;

      // 绘制十字和斜线高亮（红色半透明）
      const color = "rgba(231, 76, 60, 0.4)";
      // 列
      highlightLayer.append("rect").attr("x", c * CELL).attr("y", 0).attr("width", CELL).attr("height", SIZE).attr("fill", color);
      // 行 (其实不需要，因为按行推进)
      highlightLayer.append("rect").attr("x", 0).attr("y", r * CELL).attr("width", SIZE).attr("height", CELL).attr("fill", color);

      // 由于 SVG 画斜线较繁琐，这里用简单多边形示意主要封锁区域
      // 主对角线 \
      highlightLayer.append("line").attr("x1", c * CELL - r * CELL).attr("y1", 0)
        .attr("x2", c * CELL + (N - r) * CELL).attr("y2", SIZE)
        .attr("stroke", color).attr("stroke-width", CELL).attr("opacity", 0.5);
      // 副对角线 /
      highlightLayer.append("line").attr("x1", c * CELL + r * CELL + CELL).attr("y1", 0)
        .attr("x2", c * CELL - (N - r) * CELL + CELL).attr("y2", SIZE)
        .attr("stroke", color).attr("stroke-width", CELL).attr("opacity", 0.5);
    }

    function update() {
      if (currentFrame >= frames.length) {
        pause();
        return;
      }
      const frame = frames[currentFrame];

      // 1. 更新提示和状态面板
      d3.select("#message").text(frame.msg).style("color", frame.type === 'conflict' ? '#e74c3c' : (frame.type === 'success' ? '#27ae60' : '#d35400'));
      d3.select("#display-r").text(frame.r === N ? '完成' : frame.r);
      renderArray("#display-col", frame.col);
      renderArray("#display-diag1", frame.diag1);
      renderArray("#display-diag2", frame.diag2);

      // 2. 绘制皇后
      const queens = [];
      for (let i = 0; i < N; i++) {
        for (let j = 0; j < N; j++) {
          if (frame.board[i][j] === 'Q') queens.push({ r: i, c: j });
        }
      }

      // 添加试图放置但还没确认的半透明“幽灵皇后”
      if (frame.type === 'try' || frame.type === 'conflict') {
        queens.push({ r: frame.r, c: frame.c, ghost: true, conflict: frame.type === 'conflict' });
      }

      const qSelection = queenLayer.selectAll("text").data(queens, d => `${d.r}-${d.c}-${d.ghost}`);

      qSelection.exit().remove();

      qSelection.enter().append("text")
        .attr("x", d => d.c * CELL + CELL / 2)
        .attr("y", d => d.r * CELL + CELL / 2 + 15)
        .attr("text-anchor", "middle")
        .attr("font-size", "40px")
        .text("♛")
        .merge(qSelection)
        .attr("fill", d => d.conflict ? "#e74c3c" : "#2c3e50")
        .attr("opacity", d => d.ghost ? (d.conflict ? 0.8 : 0.4) : 1);

      // 3. 绘制高亮封锁区域
      if (frame.type === 'place' || frame.type === 'try') {
        drawHighlights(frame.r, frame.c);
      } else {
        highlightLayer.selectAll("*").remove(); // 冲突或回溯时清除射线
      }
    }

    // 交互控制
    function step() {
      if (currentFrame < frames.length - 1) {
        currentFrame++;
        update();
      }
    }

    function play() {
      if (timer) { pause(); return; }
      d3.select("#btn-play").text("暂停播放");
      timer = setInterval(step, 800); // 每 800ms 走一步
    }

    function pause() {
      clearInterval(timer);
      timer = null;
      d3.select("#btn-play").text("自动播放");
    }

    function reset() {
      pause();
      currentFrame = 0;
      update();
    }

    // 绑定事件并初始化
    d3.select("#btn-step").on("click", () => { pause(); step(); });
    d3.select("#btn-play").on("click", play);
    d3.select("#btn-reset").on("click", reset);

    generateFrames();
    update(); // 渲染初始状态

  </script>
</body>

</html>
